name: Android Release

on:
    push:
        branches:
            - main
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build-release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
                  cache: gradle

            - name: Set up Android SDK
              uses: android-actions/setup-android@v3

            - name: Install Android 16 build packages
              run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

            - name: Generate CI release keystore
              run: |
                  keytool -genkeypair -v \
                    -keystore "$GITHUB_WORKSPACE/release.keystore" \
                    -storepass android \
                    -keypass android \
                    -alias codehelper \
                    -keyalg RSA \
                    -keysize 2048 \
                    -validity 3650 \
                    -dname "CN=CodeHelper,O=CodeHelper,C=CN"

            - name: Ensure Gradle wrapper is executable
              run: chmod +x gradlew

            - name: Build release APK
              env:
                  RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
                  RELEASE_STORE_PASSWORD: android
                  RELEASE_KEY_ALIAS: codehelper
                  RELEASE_KEY_PASSWORD: android
              run: |
                  set -o pipefail
                  ./gradlew assembleRelease --stacktrace --no-daemon 2>&1 | tee gradle-build.log

            - name: Show Gradle failure excerpt
              if: failure()
              run: |
                  tail -n 200 gradle-build.log || true
                  python3 - <<'PY'
                  from pathlib import Path
                  log_path = Path("gradle-build.log")
                  if not log_path.exists():
                      print("::error title=Gradle build failed::gradle-build.log was not generated")
                      raise SystemExit(0)
                  lines = log_path.read_text(encoding="utf-8", errors="ignore").splitlines()
                  patterns = (
                      "e: ",
                      "error: ",
                      "Execution failed for task",
                      "A failure occurred while executing",
                      "What went wrong",
                      "FAILURE: Build failed with an exception.",
                  )
                  windows = []
                  for index, line in enumerate(lines):
                      if any(pattern in line for pattern in patterns):
                          start = max(0, index - 8)
                          end = min(len(lines), index + 24)
                          windows.append("\n".join(lines[start:end]))
                  excerpt = "\n\n---\n\n".join(dict.fromkeys(windows)) if windows else "\n".join(lines[-160:])
                  excerpt = excerpt.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
                  print(f"::error title=Gradle build failed::{excerpt}")
                  PY

            - name: Upload APK artifact
              uses: actions/upload-artifact@v4
              with:
                  name: CodeHelper-release-apk
                  path: app/build/outputs/apk/release/*.apk

            - name: Publish tagged release
              if: startsWith(github.ref, 'refs/tags/')
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: ${{ github.ref_name }}
                  files: app/build/outputs/apk/release/*.apk
