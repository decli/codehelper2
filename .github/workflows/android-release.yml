name: Android Release

on:
    push:
        branches:
            - main
            - "claude/*"
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build-release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
                  cache: gradle

            - name: Set up Android SDK
              uses: android-actions/setup-android@v3

            - name: Install Android 16 build packages
              run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

            - name: Generate CI release keystore
              run: |
                  keytool -genkeypair -v \
                    -keystore "$GITHUB_WORKSPACE/release.keystore" \
                    -storepass android \
                    -keypass android \
                    -alias codehelper \
                    -keyalg RSA \
                    -keysize 2048 \
                    -validity 3650 \
                    -dname "CN=CodeHelper,O=CodeHelper,C=CN"

            - name: Ensure Gradle wrapper is executable
              run: chmod +x gradlew

            - name: Build release APK
              env:
                  RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
                  RELEASE_STORE_PASSWORD: android
                  RELEASE_KEY_ALIAS: codehelper
                  RELEASE_KEY_PASSWORD: android
              run: |
                  set -o pipefail
                  ./gradlew assembleRelease --stacktrace --no-daemon 2>&1 | tee gradle-build.log

            - name: Show Gradle failure excerpt
              if: failure()
              run: |
                  tail -n 200 gradle-build.log || true
                  python3 - <<'PY'
                  from pathlib import Path
                  log_path = Path("gradle-build.log")
                  if not log_path.exists():
                      print("::error title=Gradle build failed::gradle-build.log was not generated")
                      raise SystemExit(0)
                  lines = log_path.read_text(encoding="utf-8", errors="ignore").splitlines()
                  patterns = (
                      "e: ",
                      "error: ",
                      "Execution failed for task",
                      "A failure occurred while executing",
                      "What went wrong",
                      "FAILURE: Build failed with an exception.",
                  )
                  windows = []
                  for index, line in enumerate(lines):
                      if any(pattern in line for pattern in patterns):
                          start = max(0, index - 8)
                          end = min(len(lines), index + 24)
                          windows.append("\n".join(lines[start:end]))
                  excerpt = "\n\n---\n\n".join(dict.fromkeys(windows)) if windows else "\n".join(lines[-160:])
                  excerpt = excerpt.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
                  print(f"::error title=Gradle build failed::{excerpt}")
                  PY

            - name: Upload APK artifact
              uses: actions/upload-artifact@v4
              with:
                  name: CodeHelper-release-apk
                  path: app/build/outputs/apk/release/*.apk

            - name: Publish release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v2.0.0-build.${{ github.run_number }}
                  name: "取件码助手 v2.0.0 (Build ${{ github.run_number }})"
                  body: |
                      ## 取件码助手 (CodeHelper) v2.0.0

                      自动编译构建，commit ${{ github.sha }}

                      ### v2.0.0 更新内容
                      - 全新 UI 设计：专业级界面，对老人更友好
                      - 修复左滑「已取件」按钮点击后闪退的严重 bug
                      - 全新应用图标：快递包裹+取件码标签，一目了然
                      - 优化时间筛选交互：切换时间范围立即刷新数据
                      - 已取件/未取件状态管理优化
                      - 卡片信息展示更完整（状态、时间、取件码、短信内容、命中规则）
                      - 「强制刷新所有」展示全部取件码（含已取件）
                      - 规则设置界面优化

                      ### 功能特性
                      - 自动读取手机短信，提取取件码
                      - 大字体、高对比度，老人友好界面
                      - 支持时间筛选（12小时/1天/2天/5天）
                      - 左滑标记「已取件」，支持恢复
                      - 双击卡片跳转到对应短信
                      - 自定义取件码正则提取规则
                      - 完全离线运行，无需联网

                      ### 安装说明
                      下载 APK 文件并安装，首次使用需授权短信读取权限。
                  files: app/build/outputs/apk/release/*.apk
                  draft: false
                  prerelease: false
