name: Build & Release APK

on:
  push:
    branches: [ "claude/*", "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign APK with debug key
        run: |
          # Generate a keystore for signing
          keytool -genkey -v -keystore release-key.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias codehelper \
            -dname "CN=CodeHelper, OU=App, O=CodeHelper, L=Beijing, S=Beijing, C=CN" \
            -storepass codehelper123 \
            -keypass codehelper123

          # Find the unsigned APK
          UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)

          # Use apksigner from build tools
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)

          # Align the APK
          ${BUILD_TOOLS_DIR}zipalign -v -p 4 "$UNSIGNED_APK" app/build/outputs/apk/release/app-release-aligned.apk

          # Sign the APK
          ${BUILD_TOOLS_DIR}apksigner sign \
            --ks release-key.jks \
            --ks-key-alias codehelper \
            --ks-pass pass:codehelper123 \
            --key-pass pass:codehelper123 \
            --out app/build/outputs/apk/release/CodeHelper-v1.0.0.apk \
            app/build/outputs/apk/release/app-release-aligned.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-build.${{ github.run_number }}
          name: "取件码助手 v1.0.0 (Build ${{ github.run_number }})"
          body: |
            ## 取件码助手 (CodeHelper) v1.0.0

            ### 功能特性
            - 自动读取手机短信，提取取件码
            - 大字体、高对比度，老人友好界面
            - 支持时间筛选（12小时/1天/2天/5天）
            - 左滑删除取件码，支持恢复显示
            - 双击卡片跳转到对应短信
            - 自定义取件码提取规则
            - 完全离线运行，无需联网

            ### 安装说明
            下载 CodeHelper-v1.0.0.apk 并安装，首次使用需授权短信读取权限。
          files: app/build/outputs/apk/release/CodeHelper-v1.0.0.apk
          draft: false
          prerelease: false
